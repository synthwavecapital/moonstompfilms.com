<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moonstomp Films</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --white: #f5f0e8;
      --red: #c0392b;
      --gray: #e8e3db;
      --mid: #d0c9bf;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      background-color: var(--white);
      color: var(--black);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      position: relative;
    }

    .header-stripe { background: var(--red); height: 4px; width: 100%; }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 40px;
      position: relative;
      text-align: center;
    }

    .punk-icon {
      width: clamp(150px, 22vw, 240px);
      height: auto;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(28px);
      animation: riseIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
    }

    .wordmark {
      font-family: 'UnifrakturMaguntia', serif;
      font-size: clamp(56px, 10vw, 120px);
      line-height: 0.9;
      letter-spacing: -1px;
      color: var(--black);
      text-shadow: 4px 4px 0 var(--red), 6px 6px 0 rgba(192,57,43,0.2);
      opacity: 0;
      transform: translateY(20px);
      animation: riseIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
      margin-bottom: 8px;
    }

    .wordmark span { display: block; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 36px;
      width: 100%;
      max-width: 480px;
      opacity: 0;
      animation: riseIn 0.7s ease 0.75s forwards;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--mid), var(--red), var(--mid), transparent);
    }

    .divider-skull { font-size: 18px; color: var(--red); line-height: 1; }

    .tagline {
      font-family: 'Syne', sans-serif;
      font-size: clamp(10px, 1.5vw, 13px);
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(10, 10, 10, 0.4);
      margin-bottom: 52px;
      opacity: 0;
      animation: riseIn 0.7s ease 0.85s forwards;
    }

    .cta-wrap { opacity: 0; animation: riseIn 0.7s ease 1s forwards; }

    .cta {
      display: inline-block;
      padding: 16px 44px;
      background: transparent;
      border: 2px solid var(--black);
      color: var(--black);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-decoration: none;
      position: relative;
      transition: all 0.15s ease;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }

    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--red);
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s ease;
      z-index: -1;
    }

    .cta:hover { border-color: var(--red); color: var(--white); letter-spacing: 0.4em; }
    .cta:hover::before { transform: scaleX(1); }

    .side-label {
      position: fixed;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(10, 10, 10, 0.2);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      user-select: none;
    }

    .side-label-left { left: 20px; top: 50%; transform: translateY(-50%) rotate(180deg); }
    .side-label-right { right: 20px; top: 50%; transform: translateY(-50%); }

    footer {
      border-top: 1px solid var(--mid);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(10, 10, 10, 0.35);
      position: relative;
    }

    footer::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 3px;
      background: repeating-linear-gradient(90deg, var(--red) 0px, var(--red) 8px, transparent 8px, transparent 14px);
    }

    .footer-dot { color: var(--red); }

    .corner { position: fixed; width: 20px; height: 20px; opacity: 0.3; }
    .corner-tl { top: 16px; left: 16px; border-top: 2px solid var(--red); border-left: 2px solid var(--red); }
    .corner-tr { top: 16px; right: 16px; border-top: 2px solid var(--red); border-right: 2px solid var(--red); }
    .corner-bl { bottom: 16px; left: 16px; border-bottom: 2px solid var(--red); border-left: 2px solid var(--red); }
    .corner-br { bottom: 16px; right: 16px; border-bottom: 2px solid var(--red); border-right: 2px solid var(--red); }

    @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }

    .contact-page {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--white);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 40px;
    }

    .contact-page.active { display: flex; }

    .contact-inner {
      max-width: 520px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .contact-title {
      font-family: 'UnifrakturMaguntia', serif;
      font-size: clamp(42px, 8vw, 80px);
      color: var(--black);
      margin-bottom: 12px;
      text-shadow: 3px 3px 0 var(--red);
    }

    .contact-sub {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(10, 10, 10, 0.35);
      margin-bottom: 48px;
    }

    .contact-email {
      font-family: 'Syne', sans-serif;
      font-size: clamp(14px, 2.5vw, 18px);
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--black);
      text-decoration: none;
      border-bottom: 2px solid var(--red);
      padding-bottom: 4px;
      margin-bottom: 40px;
      transition: color 0.15s;
    }

    .contact-email:hover { color: var(--red); }

    .close-btn {
      background: none;
      border: none;
      color: rgba(10, 10, 10, 0.3);
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: crosshair;
      transition: color 0.15s;
    }

    .close-btn:hover { color: var(--black); }

    @media (max-width: 600px) {
      .side-label { display: none; }
      footer { padding: 16px 20px; }
    }
  </style>
</head>
